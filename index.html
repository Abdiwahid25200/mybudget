<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخطط راتبي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

        :root {
            --bg: #0F1A17;
            --panel: #16241F;
            --panel-2: #1C2C26;
            --line: #2A3D35;
            --gold: #C9A24B;
            --gold-soft: #E8D8A8;
            --mint: #6FBF9B;
            --coral: #E0795A;
            --ink: #EDEFE8;
            --ink-dim: #9FB0A8;
        }

        *{box-sizing:border-box;margin:0;padding:0;}
        html,body{background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;min-height:100vh;}
        body{padding:0;direction:rtl;}

        /* ===== Main Dashboard Area ===== */
        #mainContent {
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 16px;
        }
    </style>
</head>
<body>

    <!-- BOGGA MASHALKA (MAIN APP DASHBOARD) -->
    <div id="mainContent">
        <div class="header">
            <h1>مرحباً بك في مخطط راتبي 👋</h1>
        </div>
        <div style="background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--line); text-align: center;">
            <p style="color: var(--mint); font-size: 20px; font-weight: bold; margin-bottom: 12px;">✓ تم فتح البرنامج بنجاح!</p>
            <p style="color: var(--ink-dim);">هنا يمكنك البدء في إدارة وتخطيط راتبك بكل سهولة وبدون قيود.</p>
        </div>
    </div>

</body>
</html>
