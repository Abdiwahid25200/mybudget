<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخطط راتبي - محمي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap');

        :root {
            --bg: #0F1A17;
            --panel: #16241F;
            --panel-2: #1C2C26;
            --line: #2A3D35;
            --gold: #C9A24B;
            --gold-soft: #E8D8A8;
            --mint: #6FBF9B;
            --coral: #E0795A;
            --ink: #EDEFE8;
            --ink-dim: #9FB0A8;
        }

        *{box-sizing:border-box;margin:0;padding:0;}
        html,body{background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;min-height:100vh;}
        body{padding:0;direction:rtl;}

        /* ===== Lock Screen ===== */
        #lockScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 24px;
        }
        .lock-card {
            background: var(--panel);
            border: 1px solid var(--line);
            padding: 40px 32px;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .lock-icon {
            font-size: 48px;
            margin-bottom: 20px;
            display: inline-block;
        }
        .lock-card h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 8px;
        }
        .lock-card p {
            color: var(--ink-dim);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--ink-dim);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input-field {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--line);
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--ink);
            font-size: 16px;
            transition: all 0.3s;
            text-align: center;
        }
        .input-field:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 0 3px rgba(201,162,75,0.15);
        }
        .btn-primary {
            width: 100%;
            background: var(--gold);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: var(--gold-soft);
        }
        .btn-secondary {
            background: none;
            border: 1px solid var(--line);
            color: var(--ink-dim);
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        .btn-secondary:hover {
            color: var(--ink);
            border-color: var(--ink-dim);
        }
        .alert-box {
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: right;
        }
        .alert-danger {
            background: rgba(224,121,90,0.1);
            border: 1px solid var(--coral);
            color: var(--coral);
        }
        .alert-success {
            background: rgba(111,191,155,0.1);
            border: 1px solid var(--mint);
            color: var(--mint);
        }

        /* ===== Main Dashboard Area ===== */
        #mainContent {
            display: none;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 16px;
        }
        .logout-btn {
            background: rgba(224,121,90,0.1);
            color: var(--coral);
            border: 1px solid var(--coral);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
    <!-- Soo daji EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

    <!-- 1. BOGGA QUFULKA (LOCK SCREEN) -->
    <div id="lockScreen">
        <div class="lock-card">
            <span class="lock-icon">🔒</span>
            <h2>مخطط راتبي</h2>
            <p>هذه الصفحة محمية بكلمة مرور ورمز تحقق على بريدك الإلكتروني</p>

            <div id="alertBox" class="alert-box alert-danger"></div>

            <!-- Qaybta 1: Erayga Sirta ah (Password) -->
            <div id="passwordStep">
                <div class="input-group">
                    <label>أدخل كلمة المرور العامة</label>
                    <input type="password" id="passwordInput" class="input-field" placeholder="••••••••">
                </div>
                <button class="btn-primary" onclick="verifyPassword()">التالي ➔</button>
            </div>

            <!-- Qaybta 2: Nambarka Amniga ee iimeelka (OTP) -->
            <div id="otpStep" style="display: none;">
                <div class="input-group">
                    <label>رمز التحقق (OTP)</label>
                    <input type="text" id="otpInput" class="input-field" placeholder="0 0 0 0 0 0" maxlength="6" style="letter-spacing: 8px; font-family: 'IBM Plex Mono', monospace;">
                </div>
                <button class="btn-primary" onclick="verifyOTP()">دخول 🔓</button>
                <button class="btn-secondary" onclick="sendOTP()">إعادة إرسال الرمز</button>
                <button class="btn-secondary" onclick="backToPassword()" style="border:none;">← تغيير كلمة المرور</button>
            </div>
        </div>
    </div>

    <!-- 2. BOGGA MASHALKA (MAIN APP DASHBOARD) -->
    <div id="mainContent">
        <div class="header">
            <h1>مرحباً بك في مخطط راتبي 👋</h1>
            <button class="logout-btn" onclick="logout()">تسجيل الخروج 🚪</button>
        </div>
        <div style="background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--line); text-align: center;">
            <p style="color: var(--mint); font-size: 20px; font-weight: bold; margin-bottom: 12px;">✓ تم الدخول بنجاح وبشكل آمن!</p>
            <p style="color: var(--ink-dim);">هنا يمكنك البدء في إدارة وتخطيط راتبك بكل سهولة.</p>
        </div>
    </div>

    <script>
        // === CONFIGURATION ===
        const CORRECT_PASSWORD = "MyBudget@2025";
        let generatedOTP = "";

        // === KOOPIYEE CODES-KAAGA EMAILJS HALKAN ===
        emailjs.init("u6bM7D_vIAnXlR88h"); 

        const EMAILJS_SERVICE_ID = "service_gtdw0it";   
        const EMAILJS_TEMPLATE_ID = "template_j0p4kdr"; 

        // Xaaladaha UI-ga badbaadiya
        function showAlert(text, type = 'danger') {
            const box = document.getElementById('alertBox');
            box.innerText = text;
            box.className = `alert-box alert-${type}`;
            box.style.display = 'block';
        }
        function hideAlert() {
            document.getElementById('alertBox').style.display = 'none';
        }

        // Tillaabada 1aad: Hubi Password-ka
        function verifyPassword() {
            hideAlert();
            const pass = document.getElementById('passwordInput').value;
            if (pass === CORRECT_PASSWORD) {
                sendOTP();
            } else {
                showAlert("كلمة المرور غير صحيحة! حاول مرة أخرى.");
            }
        }

        // Tillaabada 2aad: Abuur OTP oo u dir Iimeelka
        function sendOTP() {
            hideAlert();
            // Samee 6 nambar oo random ah
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            showAlert("جاري إرسال رمز التحقق إلى بريدك الإلكتروني...", "success");

            // Nidaamka loo dirayo EmailJS
            const templateParams = {
                otp_code: generatedOTP,
                to_name: "Abdiwahid"
            };

            emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
                .then(function(response) {
                    showAlert("تم إرسال رمز مكون من 6 أرقام إلى بريدك الإلكتروني. تحقق من صندوق الوارد أو البريد المزعج.", "success");
                    document.getElementById('passwordStep').style.display = 'none';
                    document.getElementById('otpStep').style.display = 'block';
                }, function(error) {
                    console.error("EmailJS Error:", error);
                    showAlert("فشل إرسال البريد الإلكتروني. تحقق من إعدادات EmailJS في القنصل (Console).", "danger");
                });
        }

        // Tillaabada 3aad: Hubi OTP-ga uu macaamiilku qoray
        function verifyOTP() {
            hideAlert();
            const userOTP = document.getElementById('otpInput').value.trim();
            
            if (userOTP === generatedOTP) {
                // Fur boggii rasmiga ahaa
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                showAlert("رمز التحقق غير صحيح! يرجى التأكد من الرمز المرسل.");
            }
        }

        function backToPassword() {
            hideAlert();
            document.getElementById('otpStep').style.display = 'none';
            document.getElementById('passwordStep').style.display = 'block';
        }

        function logout() {
            window.location.reload();
        }
    </script>
</body>
</html>
